name: medreg

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medreg
      POSTGRES_USER: medreg
      POSTGRES_PASSWORD: medreg
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medreg -d medreg"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6433:6333"
      - "6434:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/medreg-secret
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6479:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: medreg
      MINIO_ROOT_PASSWORD: medreg-secret
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  redis_data:
  minio_data:

